secrets:
  service-accounts:
    type: raw
    data:
      insdcIngestUserPassword: "insdc_ingest_user"
      preprocessingPipelinePassword: "preprocessing_pipeline"
      externalMetadataUpdaterPassword: "external_metadata_updater"
      backendUserPassword: "backend"
createTestAccounts: true
backendExtraArgs:
  - "--loculus.debug-mode=true"
disableEnaSubmission: true
auth:
  verifyEmail: false
# `.localhost` resolves to 127.0.0.1 in every browser per RFC 6761 and
# contains a period, satisfying Authelia's cookie-domain validation.
host: loculus.localhost:3000
subdomainSeparator: "."
siloImport:
  pollIntervalSeconds: 5
