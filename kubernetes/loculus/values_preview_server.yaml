# Preview-server values for the ReVSeq PR preview.
# Keep generic preview credentials/resources, then apply the ReVSeq instance overlay.
createTestAccounts: true
secrets:
  smtp-password:
    type: sealedsecret
    clusterWide: 'true'
    encryptedData:
      secretKey: 
  orcid:
    type: sealedsecret
    clusterWide: 'true'
    encryptedData:
      orcidSecret: 
  ingest-ncbi:
    type: sealedsecret
    clusterWide: 'true'
    encryptedData:
      api-key: 
  slack-notifications:
    type: sealedsecret
    clusterWide: 'true'
    encryptedData:
      slack-hook: 
      slack-token: 
      slack-channel-id: 
  ena-submission:
    type: sealedsecret
    clusterWide: 'true'
    encryptedData:
      username: 
      password: 
  s3-bucket:
    type: sealedsecret
    clusterWide: 'true'
    encryptedData:
      accessKey: 
      secretKey: 
previewDocs: true
robotsNoindexHeader: true
disableEnaSubmission: true
additionalHeadHTML: '<script defer data-domain="loculus.org" src="https://plausible.io/js/script.js"></script><script type="module" src="/custom-displays/revseq-details.js"></script>'
ingest:
