{{- $views := dict }}
{{- range $key, $view := (.Values.views | default dict) }}
  {{- $views = set $views $key $view }}
{{- end }}
{{- if and .Values.overview .Values.overview.enabled }}
  {{- $legacyKey := .Values.overview.key | default "overview" }}
  {{- if not (hasKey $views $legacyKey) }}
    {{- $views = set $views $legacyKey .Values.overview }}
  {{- end }}
{{- end }}
{{- range $key, $view := $views }}
{{- if or (not (hasKey $view "enabled")) $view.enabled }}
{{- $dockerTag := include "loculus.dockerTag" $.Values }}
{{- $backendHost := $.Values.disableBackend | ternary
    "http://host.k3d.internal:8079"
    "http://loculus-backend-service:8079"
}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loculus-lapis-{{ $key }}
spec:
  replicas: {{ $.Values.replicas.lapis | default 1 }}
  selector:
    matchLabels:
      app: loculus
      component: lapis-{{ $key }}
  template:
    metadata:
      annotations:
        valuesHash: {{ $.Values | toJson | sha256sum | quote }}
      labels:
        app: loculus
        component: lapis-{{ $key }}
    spec:
      {{- include "possiblePriorityClassName" $ | nindent 6 }}
      initContainers:
        {{- include "loculus.overviewConfigAdapterInitContainer" (dict
              "dockerTag" $dockerTag
              "imagePullPolicy" $.Values.imagePullPolicy
              "images" $.Values.images
              "backendUrl" $backendHost
              "viewKey" $key) | nindent 8 }}
      containers:
        - name: lapis
          image: "{{ $.Values.images.lapis.repository }}:{{ $.Values.images.lapis.tag }}"
          imagePullPolicy: "{{ $.Values.images.lapis.pullPolicy | default $.Values.imagePullPolicy }}"
          {{- include "loculus.resources" (list "lapis" $.Values $key) | nindent 10 }}
          ports:
            - containerPort: 8080
          args:
            - "--silo.url=http://loculus-silo-service-{{ $key }}:8081"
          env:
            - name: JVM_OPTS
              value: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:MaxHeapFreeRatio=5 -XX:MinHeapFreeRatio=2 -XX:MaxGCPauseMillis=100
          volumeMounts:
            - name: lapis-silo-database-config-processed
              mountPath: /workspace/database_config.yaml
              subPath: database_config.yaml
            - name: lapis-silo-database-config-processed
              mountPath: /workspace/reference_genomes.json
              subPath: reference_genomes.json
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /sample/info
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        {{- include "loculus.adapterVolume" $ | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ template "loculus.lapisServiceName" $key }}
spec:
  type: ClusterIP
  selector:
    app: loculus
    component: lapis-{{ $key }}
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
{{- end }}
{{- end }}
