{{- $dockerTag := include "loculus.dockerTag" .Values }}
{{- if not .Values.disableIngest }}
{{- $ingestOrganisms := list }}
{{- range $_, $item := (include "loculus.enabledOrganisms" . | fromJson).organisms }}
  {{- if $item.contents.ingest }}
  {{- $ingestOrganisms = append $ingestOrganisms $item }}
  {{- end }}
{{- end }}
{{- $ingestCount := len $ingestOrganisms }}
{{- if gt $ingestCount 0 }}
{{/*
RBAC so each ingest pod can list other ingest pods to avoid the CronJob
run and the sync-triggered bootstrap Job overlapping for the same organism.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loculus-ingest-lock
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: loculus-ingest-lock
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: loculus-ingest-lock
subjects:
  - kind: ServiceAccount
    name: loculus-ingest-lock
roleRef:
  kind: Role
  name: loculus-ingest-lock
  apiGroup: rbac.authorization.k8s.io
{{/*
Separate, narrower RBAC for the per-sync trigger Job: it just spawns a
one-shot ingest Job from the corresponding CronJob's template.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loculus-ingest-trigger
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: loculus-ingest-trigger
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: loculus-ingest-trigger
subjects:
  - kind: ServiceAccount
    name: loculus-ingest-trigger
roleRef:
  kind: Role
  name: loculus-ingest-trigger
  apiGroup: rbac.authorization.k8s.io
{{/*
Schedule one organism per 30-minute slot so ingest runs are staggered.
Period (hours) = ceil(N/2); organism i runs at minute (i%2)*30 of hour
(i/2) within each period.
*/}}
{{- $periodHours := div (add $ingestCount 1) 2 }}
{{- range $i, $item := $ingestOrganisms }}
  {{- $key := $item.key }}
  {{- $organismContent := $item.contents }}
  {{- $minute := mul (mod $i 2) 30 }}
  {{- $hourOffset := div $i 2 }}
  {{- $hourExpr := "*" }}
  {{- if gt $periodHours 1 }}
    {{- $hourExpr = printf "%d-23/%d" $hourOffset $periodHours }}
  {{- end }}
  {{- $schedule := printf "%d %s * * *" $minute $hourExpr }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: loculus-ingest-cronjob-{{ $key }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  schedule: {{ $schedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ $.Values.ingestLimitSeconds }}
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: loculus
            component: loculus-ingest-cronjob-{{ $key }}
            ingest-organism: {{ $key }}
            loculus-ingest-runner: "true"
        spec:
          {{- include "possiblePriorityClassName" (dict "Values" $.Values) | nindent 10 }}
          serviceAccountName: loculus-ingest-lock
          restartPolicy: Never
          initContainers:
            - name: version-check
              image: busybox
              {{- include "loculus.resources" (list "ingest-init" $.Values) | nindent 14 }}
              command: ['sh', '-c', '
                CONFIG_VERSION=$(grep "verify_loculus_version_is:" /package/config/config.yaml | sed "s/verify_loculus_version_is: //;");
                DOCKER_TAG="{{ $dockerTag }}";
                echo "Config version: $CONFIG_VERSION";
                echo "Docker tag: $DOCKER_TAG";
                if [ "$CONFIG_VERSION" != "$DOCKER_TAG" ]; then
                  echo "Version mismatch: ConfigMap version $CONFIG_VERSION does not match docker tag $DOCKER_TAG";
                  exit 1;
                else
                  echo "Version match confirmed";
                fi
              ']
              volumeMounts:
                - name: loculus-ingest-config-volume-{{ $key }}
                  mountPath: /package/config/config.yaml
                  subPath: config.yaml
            - name: wait-for-no-other-ingest
              image: alpine/kubectl:1.36.0
              command:
                - sh
                - -c
                - |
                  set -eu
                  while true; do
                    ALL=$(kubectl get pods \
                      -l ingest-organism={{ $key }},loculus-ingest-runner=true \
                      -o jsonpath='{range .items[*]}{.metadata.name} {.status.phase}{"\n"}{end}')
                    RUNNING=$(echo "$ALL" | awk -v me="$HOSTNAME" '$2=="Running" && $1!=me {print $1}')
                    if [ -n "$RUNNING" ]; then
                      echo "Waiting for running ingest pod(s) for {{ $key }}: $RUNNING"
                      sleep 30
                      continue
                    fi
                    # No peer in Running. Tie-break among Pending pods (typically all in init):
                    # lowest pod name by lexicographic order wins, others wait until it transitions.
                    LEADER=$(echo "$ALL" | awk '$2=="Pending" {print $1}' | sort | head -n 1)
                    if [ -z "$LEADER" ] || [ "$LEADER" = "$HOSTNAME" ]; then
                      echo "No conflicting ingest pods for {{ $key }}, proceeding."
                      exit 0
                    fi
                    echo "Tie-break for {{ $key }}: yielding to lower-named peer $LEADER"
                    sleep 10
                  done
          containers:
            - name: ingest-{{ $key }}
              image: {{ $organismContent.ingest.image }}:{{ $dockerTag }}
              imagePullPolicy: {{ $.Values.imagePullPolicy }}
              {{- include "loculus.resources" (list "ingest" $.Values) | nindent 14 }}
              env:
                - name: KEYCLOAK_INGEST_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: service-accounts
                      key: insdcIngestUserPassword
                - name: SLACK_HOOK
                  valueFrom:
                    secretKeyRef:
                      name: slack-notifications
                      key: slack-hook
                - name: NCBI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ingest-ncbi
                      key: api-key
              args:
                - snakemake
                - results/submitted
                - results/revised
                - --all-temp
          {{- if $organismContent.ingest.configFile }}
              volumeMounts:
                - name: loculus-ingest-config-volume-{{ $key }}
                  mountPath: /package/config/config.yaml
                  subPath: config.yaml
          volumes:
            - name: loculus-ingest-config-volume-{{ $key }}
              configMap:
                name: loculus-ingest-config-{{ $key }}
          {{- end }}
{{/*
Sync-hook trigger: kicks off a one-off ingest Job from the CronJob's
template whenever argocd syncs. The trigger itself exits in seconds
(so it doesn't block the sync); the spawned ingest Job runs untracked
by argocd. Concurrency with a scheduled CronJob run is handled by the
shared lock init container in the spawned pod.
*/}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: loculus-ingest-trigger-{{ $key }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  activeDeadlineSeconds: 120
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: loculus
        component: loculus-ingest-trigger-{{ $key }}
    spec:
      restartPolicy: Never
      serviceAccountName: loculus-ingest-trigger
      containers:
        - name: trigger
          image: alpine/kubectl:1.36.0
          command:
            - sh
            - -c
            - |
              set -eu
              JOB_NAME="loculus-ingest-bootstrap-{{ $key }}-$(date +%s)"
              echo "Creating $JOB_NAME from cronjob/loculus-ingest-cronjob-{{ $key }}"
              kubectl create job --from=cronjob/loculus-ingest-cronjob-{{ $key }} "$JOB_NAME"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: loculus-revoke-and-regroup-cronjob-{{ $key }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  schedule: "0 0 31 2 *" # Never runs without manual trigger
  suspend: true
  startingDeadlineSeconds: 60
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ $.Values.ingestLimitSeconds }}
      template:
        metadata:
          labels:
            app: loculus
            component: loculus-ingest-cronjob-{{ $key }}
        spec:
          {{- include "possiblePriorityClassName" $ | nindent 10 }}
          restartPolicy: Never
          containers:
            - name: ingest-{{ $key }}
              image: {{ $organismContent.ingest.image}}:{{ $dockerTag }}
              imagePullPolicy: {{ $.Values.imagePullPolicy }}
              resources:
                requests:
                  memory: "1Gi"
                  cpu: "200m"
                limits:
                  cpu: "200m"
                  memory: "10Gi"
              env:
                - name: KEYCLOAK_INGEST_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: service-accounts
                      key: insdcIngestUserPassword
              args:
                - snakemake
                - results/submitted
                - results/revised
                - results/revoked
                - --all-temp # Reduce disk usage by not keeping files around
          {{- if $organismContent.ingest.configFile }}
              volumeMounts:
                - name: loculus-ingest-config-volume-{{ $key }}
                  mountPath: /package/config/config.yaml
                  subPath: config.yaml
          volumes:
            - name: loculus-ingest-config-volume-{{ $key }}
              configMap:
                name: loculus-ingest-config-{{ $key }}
          {{- end }}
{{- end }}
{{- end }}
{{- end }}
