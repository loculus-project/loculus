{{- $dockerTag := include "loculus.dockerTag" .Values }}
{{- if not .Values.disableIngest }}
{{- $ingestOrganisms := list }}
{{- range $_, $item := (include "loculus.enabledOrganisms" . | fromJson).organisms }}
  {{- if $item.contents.ingest }}
  {{- $ingestOrganisms = append $ingestOrganisms $item }}
  {{- end }}
{{- end }}
{{- $ingestCount := len $ingestOrganisms }}
{{- if gt $ingestCount 0 }}
{{/*
RBAC so each ingest pod can list other ingest pods to avoid CronJob and
Sync-hook Job runs overlapping for the same organism.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loculus-ingest-lock
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: loculus-ingest-lock
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: loculus-ingest-lock
subjects:
  - kind: ServiceAccount
    name: loculus-ingest-lock
roleRef:
  kind: Role
  name: loculus-ingest-lock
  apiGroup: rbac.authorization.k8s.io
{{/*
Schedule one organism per 30-minute slot so ingest runs are staggered.
Period (hours) = ceil(N/2); organism i runs at minute (i%2)*30 of hour
(i/2) within each period.
*/}}
{{- $periodHours := div (add $ingestCount 1) 2 }}
{{- range $i, $item := $ingestOrganisms }}
  {{- $key := $item.key }}
  {{- $organismContent := $item.contents }}
  {{- $minute := mul (mod $i 2) 30 }}
  {{- $hourOffset := div $i 2 }}
  {{- $hourExpr := "*" }}
  {{- if gt $periodHours 1 }}
    {{- $hourExpr = printf "%d-23/%d" $hourOffset $periodHours }}
  {{- end }}
  {{- $schedule := printf "%d %s * * *" $minute $hourExpr }}
  {{- $podArgs := dict "key" $key "dockerTag" $dockerTag "organismContent" $organismContent "Values" $.Values }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: loculus-ingest-cronjob-{{ $key }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  schedule: {{ $schedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ $.Values.ingestLimitSeconds }}
      template:
        metadata:
          labels:
            app: loculus
            component: loculus-ingest-cronjob-{{ $key }}
            ingest-organism: {{ $key }}
            loculus-ingest-runner: "true"
        spec:
          {{- include "loculus.ingestPodSpec" $podArgs | nindent 10 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: loculus-ingest-sync-{{ $key }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: {{ $.Values.ingestLimitSeconds }}
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: loculus
        component: loculus-ingest-sync-{{ $key }}
        ingest-organism: {{ $key }}
        loculus-ingest-runner: "true"
    spec:
      {{- include "loculus.ingestPodSpec" $podArgs | nindent 6 }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: loculus-revoke-and-regroup-cronjob-{{ $key }}
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  schedule: "0 0 31 2 *" # Never runs without manual trigger
  suspend: true
  startingDeadlineSeconds: 60
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ $.Values.ingestLimitSeconds }}
      template:
        metadata:
          labels:
            app: loculus
            component: loculus-ingest-cronjob-{{ $key }}
        spec:
          {{- include "possiblePriorityClassName" $ | nindent 10 }}
          restartPolicy: Never
          containers:
            - name: ingest-{{ $key }}
              image: {{ $organismContent.ingest.image}}:{{ $dockerTag }}
              imagePullPolicy: {{ $.Values.imagePullPolicy }}
              resources:
                requests:
                  memory: "1Gi"
                  cpu: "200m"
                limits:
                  cpu: "200m"
                  memory: "10Gi"
              env:
                - name: KEYCLOAK_INGEST_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: service-accounts
                      key: insdcIngestUserPassword
              args:
                - snakemake
                - results/submitted
                - results/revised
                - results/revoked
                - --all-temp # Reduce disk usage by not keeping files around
          {{- if $organismContent.ingest.configFile }}
              volumeMounts:
                - name: loculus-ingest-config-volume-{{ $key }}
                  mountPath: /package/config/config.yaml
                  subPath: config.yaml
          volumes:
            - name: loculus-ingest-config-volume-{{ $key }}
              configMap:
                name: loculus-ingest-config-{{ $key }}
          {{- end }}
{{- end }}
{{- end }}
{{- end }}
