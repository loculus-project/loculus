{{- $lapisHost := printf "lapis%s%s" .Values.subdomainSeparator .Values.host }}
{{- $traefikApiVersion := ternary "traefik.io/v1alpha1" "traefik.containo.us/v1alpha1" (eq (int $.Values.traefikVersion) 3) -}}
apiVersion: {{ $traefikApiVersion }}
kind: Middleware
metadata:
  name: cors-all-origins
spec:
  headers:
    accessControlAllowMethods:
      - "GET"
      - "OPTIONS"
      - "POST"
      - "HEAD"
    accessControlAllowOriginList:
      - "*"
    accessControlMaxAge: 100
    accessControlAllowHeaders:
      - "*"
---
# Public ingress for query-service. The hostname keeps its historical
# `lapis.<host>` form for now; the API surface served here is the
# query-service v1 API (see query-service/README.md).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lapis-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: "{{ $.Release.Namespace }}-cors-all-origins@kubernetescrd"
spec:
  rules:
  - host: {{ if eq $.Values.environment "server" }}{{ $lapisHost }}{{ end }}
    http:
      paths:
      - path: /
        pathType: {{ ternary "ImplementationSpecific" "Prefix" (eq $.Values.environment "server") }}
        backend:
          service:
            name: loculus-query-service
            port:
              number: 8080
  {{- if eq $.Values.environment "server" }}
  tls:
  - hosts:
    - {{ $lapisHost }}
  {{- end }}
