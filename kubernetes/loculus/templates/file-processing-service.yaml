{{- if not .Values.disableFileProcessingService }}
apiVersion: v1
kind: Service
metadata:
  name: loculus-file-processing
spec:
  {{- template "loculus.serviceType" . }}
  selector:
    app: loculus
    component: loculus-file-processing
  ports:
    - port: 5000
      targetPort: 5000
      {{- if ne $.Values.environment "server" }}
      nodePort: 30052
      {{- end }}
      protocol: TCP
      name: http
{{- end }}
