{{- $dockerTag := include "loculus.dockerTag" .Values }}
{{- $keycloakTokenUrl := "http://loculus-keycloak-service:8083/realms/loculus/protocol/openid-connect/token" }}
{{- $backendHost := .Values.disableBackend | ternary
    "http://host.k3d.internal:8079"
    "http://loculus-backend-service:8079"
}}
{{- /* Lineage system definitions live in the backend DB (canonical
       InstanceConfig.lineageSystemDefinitions). The config-adapter init container
       fetches them and writes lineage_definitions.json into the shared volume;
       the silo-importer reads that file and downloads the definitions itself. */ -}}
{{- range $_, $item := (include "loculus.enabledOrganisms" . | fromJson).organisms }}
{{- $key := $item.key }}
{{- $organismContent := $item.contents }}
{{- $hierarchicalFilters := $organismContent | include "loculus.hierarchicalFiltersForOrganism" | fromYaml }}
{{- $configVersion := default 1 ($organismContent.configVersion) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loculus-silo-{{ $key }}
  annotations:
    # Force replace when run a) with dev db and b) without persistence to ensure silo prepro fails loudly
    argocd.argoproj.io/sync-options: Replace=true{{ if (and (not $.Values.developmentDatabasePersistence) $.Values.runDevelopmentMainDatabase) }},Force=true{{ end }}
spec:
  progressDeadlineSeconds: 1200  # 20 minute timeout to allow for long silo imports e.g. mpox
  replicas: 1
  selector:
    matchLabels:
      app: loculus
      component: silo-{{ $key }}
  template:
    metadata:
      annotations:
        valuesHash: {{ $.Values | toJson | sha256sum | quote }}
      labels:
        app: loculus
        component: silo-{{ $key }}
    spec:
      {{- include "possiblePriorityClassName" $ | nindent 6 }}
      {{- include "loculus.podScheduling" $ | nindent 6 }}
      initContainers:
        {{- include "loculus.configAdapterInitContainer" (dict
              "organismKey" $key
              "configVersion" $configVersion
              "dockerTag" $dockerTag
              "imagePullPolicy" $.Values.imagePullPolicy
              "images" $.Values.images
              "backendUrl" $backendHost) | nindent 8 }}
      containers:
        - name: silo
          image: "{{ $.Values.images.loculusSilo.repository }}:{{ $.Values.images.loculusSilo.tag | default $dockerTag }}"
          command: ["/usr/local/bin/silo"]
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          {{- include "loculus.resources" (list "silo" $.Values $key) | nindent 10 }}
          env:
            - name: SPDLOG_LEVEL
              value: "debug"
            - name: SILO_DATA_DIRECTORY
              value: "/data/"
          ports:
            - containerPort: 8081
          args:
            - "api"
            - "--api-threads-for-http-connections"
            - {{ default 16 (($.Values.silo).apiThreadsForHttpConnections) | quote }}
            - "--api-max-queued-http-connections"
            - "1000"
            - "--query-materialization-cutoff"
            - "3276"
          volumeMounts:
            - name: lapis-silo-shared-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /info
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
        - name: silo-importer
          image: "{{ $.Values.images.loculusSilo.repository }}:{{ $.Values.images.loculusSilo.tag | default $dockerTag }}"
          imagePullPolicy: "{{ $.Values.images.loculusSilo.pullPolicy }}"
          {{- include "loculus.resources" (list "silo-importer" $.Values) | nindent 10 }}
          env:
            - name: BACKEND_BASE_URL
              {{- if $.Values.disableBackend }}
              value: "http://host.k3d.internal:8079/{{ $key }}"
              {{- else }}
              value: "http://loculus-backend-service:8079/{{ $key }}"
              {{- end }}
            - name: LINEAGE_DEFINITIONS_FILE
              value: "/app/lineage_definitions.json"
            {{- if $hierarchicalFilters }}
            - name: HIERARCHICAL_FILTERS
              value: {{ $hierarchicalFilters | toJson | quote }}
            {{- end }}
            - name: SILO_RUN_TIMEOUT_SECONDS
              value: {{ $.Values.siloImport.siloTimeoutSeconds | quote }}
            - name: HARD_REFRESH_INTERVAL
              value: {{ $.Values.siloImport.hardRefreshIntervalSeconds | quote }}
            - name: SILO_IMPORT_POLL_INTERVAL_SECONDS
              value: {{ $.Values.siloImport.pollIntervalSeconds | quote }}
            - name: PATH_TO_SILO_BINARY
              value: "/usr/local/bin/silo"
            - name: PREPROCESSING_CONFIG
              value: "/app/preprocessing_config.yaml"
          volumeMounts:
            - name: lapis-silo-database-config-processed
              mountPath: /preprocessing/input/reference_genomes.json
              subPath: reference_genomes.json
            - name: lapis-silo-database-config-processed
              mountPath: /preprocessing/input/database_config.yaml
              subPath: database_config.yaml
            - name: lapis-silo-database-config-processed
              mountPath: /app/preprocessing_config.yaml
              subPath: preprocessing_config.yaml
            - name: lapis-silo-database-config-processed
              mountPath: /app/lineage_definitions.json
              subPath: lineage_definitions.json
            - name: lapis-silo-shared-data
              mountPath: /preprocessing/output
            - name: lapis-silo-input-data-cache
              mountPath: /preprocessing/input
      volumes:
        {{- include "loculus.adapterVolume" . | nindent 8 }}
        - name: lapis-silo-shared-data
          emptyDir: {}
        - name: lapis-silo-input-data-cache
          emptyDir: {}
{{- end }}
