{{- $sharedMetadata := $.Values.sharedMetadata | default list }}
{{- range $_, $item := (include "loculus.enabledOrganisms" . | fromJson).organisms }}
{{- $organism := $item.key }}
{{- $organismConfig := $item.contents }}
{{- $referenceGenomes:= include "loculus.mergeReferenceGenomes" $organismConfig.referenceGenomes | fromYaml }}
{{- $flattened := include "loculus.flattenPreprocessingVersions" $organismConfig.preprocessing | fromJson }}
{{- /* Apply sharedMetadataOverrides: override preprocessing key for matching shared fields */}}
{{- $overrideMap := dict }}
{{- range ($organismConfig.schema.sharedMetadataOverrides | default list) }}
{{- $_ := set $overrideMap .name . }}
{{- end }}
{{- $resolvedShared := list }}
{{- range $sharedMetadata }}
{{- if hasKey $overrideMap .name }}
{{- $override := get $overrideMap .name }}
{{- $field := deepCopy . }}
{{- if hasKey $override "preprocessing" }}
{{- $_ := set $field "preprocessing" $override.preprocessing }}
{{- end }}
{{- $resolvedShared = append $resolvedShared $field }}
{{- else }}
{{- $resolvedShared = append $resolvedShared . }}
{{- end }}
{{- end }}
{{- $metadata := concat $resolvedShared ($organismConfig.schema.organismSpecificMetadata | default list) }}
{{- range $processingIndex, $processingConfig := $flattened.items }}
{{- if $processingConfig.configFile }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loculus-preprocessing-config-{{ $organism }}-v{{ $processingConfig.version }}-{{ $processingIndex }}
data:
  preprocessing-config.yaml: |
    organism: {{ $organism }}
    {{- $processingConfig.configFile | toYaml | nindent 4 }}
    {{- if and (hasKey $organismConfig.schema "submissionDataTypes") (hasKey $organismConfig.schema.submissionDataTypes "maxSequencesPerEntry") }}
    max_sequences_per_entry: {{ $organismConfig.schema.submissionDataTypes.maxSequencesPerEntry }}
    {{- end }}
    processing_spec:
      {{- $args := dict "metadata" $metadata "referenceGenomes" $organismConfig.referenceGenomes }}
      {{- include "loculus.preprocessingSpecs" $args | nindent 6 }}
      versionComment:
        function: identity
        inputs:
          input: versionComment
        args:
{{- end }}
{{- end }}
{{- end }}
