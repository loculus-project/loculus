{{- if not .Values.disableTaxonomyService }}
apiVersion: v1
kind: Service
metadata:
  name: loculus-taxonomy-service
spec:
  {{- template "loculus.serviceType" . }}
  selector:
    app: loculus
    component: loculus-taxonomy-service
  ports:
    - port: 5000
      targetPort: 5000
      {{- if ne $.Values.environment "server" }}
      nodePort: 30051
      {{- end }}
      protocol: TCP
      name: http
{{- end }}
