{{- if .Values.runDevelopmentMainDatabase }}
apiVersion: v1
kind: Service
metadata:
  name: loculus-database-service
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  
  {{- template "loculus.serviceType" .}}
  selector:
    app: loculus
    component: database
  ports:
    - port: 5432
      targetPort: 5432
      {{- if ne $.Values.environment "server" }}
      nodePort: 30432
      {{- end }}
      protocol: TCP
      name: http
{{- end }}
