{{- if .Values.runDevelopmentKeycloakDatabase }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "loculus.keycloakDatabaseServiceName" . }}
spec:
  type: ClusterIP
  selector:
    app: loculus
    component: keycloak-database-{{ include "loculus.dockerTag" .Values | trim }}
  ports:
    - port: 5432
{{- end }}
