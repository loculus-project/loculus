{{- if .Values.runDevelopmentKeycloakDatabase }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "loculus.keycloakDatabaseServiceName" . }}
spec:
  type: ClusterIP
  selector:
    app: loculus
    component: keycloak-database-{{ if not .Values.developmentDatabasePersistence }}{{ include "loculus.dockerTag" .Values | trim }}{{ end }}
  ports:
    - port: 5432
{{- end }}
