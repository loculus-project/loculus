schema:
  submissionDataTypes:
    consensusSequences: true
    maxSequencesPerEntry: 1
  image: /images/organisms/rsv.jpg
  organismName: Test organism (without alignment)
  metadata:
    - name: date
      displayName: Date
      type: date
      initiallyVisible: true
      header: Collection Details
    - name: lineage
      isSequenceFilter: true
      lineageSearch: true
      initiallyVisible: true
      displayName: Lineage
      autocomplete: true
      type: string
      lineageSystem: alternativeLineage
      options: &id001
        - name: A
        - name: A.1
        - name: A.1.1
        - name: A.2
        - name: B
        - name: B.1
        - name: B.1.1
        - name: B.1.1.1
        - name: C
        - name: C.1
    - name: region
      displayName: Region
      type: string
      initiallyVisible: true
      generateIndex: true
      autocomplete: true
      header: Collection Details
    - name: country
      displayName: Country
      initiallyVisible: true
      type: string
      generateIndex: true
      autocomplete: true
      header: Collection Details
    - name: division
      displayName: Division
      initiallyVisible: true
      type: string
      generateIndex: true
      autocomplete: true
      header: Collection Details
    - name: host
      displayName: Host
      initiallyVisible: true
      type: string
      autocomplete: true
      header: Collection Details
    - name: versionComment
      type: string
  tableColumns:
    - country
    - division
    - date
  defaultOrderBy: date
  defaultOrder: descending
  inputFields:
    - name: id
      displayName: ID
      example: GJP123
      noEdit: true
      required: true
      definition: Your sequence identifier; should match the sequence's id in the FASTA file - this is used to link the metadata to the FASTA sequence.
    - name: date
      displayName: Date
      required: true
    - name: lineage
      displayName: Lineage
      required: true
      options: *id001
    - name: region
      displayName: Region
    - name: country
      displayName: Country
    - name: division
      displayName: Division
    - name: host
      displayName: Host
referenceGenomes:
  - name: main
    references:
      - name: singleReference
        sequence: ''
referenceGenome:
  nucleotideSequences:
    - name: main
      sequence: ''
  genes: []
displayName: Test organism (without alignment)

# Upstream LAPIS instance for the backend proxy / query API (in-cluster service).
lapisUrl: "http://loculus-lapis-service-not-aligned-organism:8080"
