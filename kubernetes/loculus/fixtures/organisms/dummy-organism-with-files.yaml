schema:
  image: /images/organisms/hmpv.jpg
  organismName: Test organism (with files)
  submissionDataTypes:
    consensusSequences: false
    files:
      enabled: true
      categories:
        - name: raw_reads
          displayName: Raw reads
  files:
    - name: raw_reads
      displayName: Raw reads
  metadata:
    - name: date
      displayName: Date
      type: date
      initiallyVisible: true
      header: Collection Details
    - name: region
      displayName: Region
      type: string
      initiallyVisible: true
      generateIndex: true
      autocomplete: true
      header: Collection Details
    - name: country
      displayName: Country
      initiallyVisible: true
      type: string
      generateIndex: true
      autocomplete: true
      options: &id001
        - name: Germany
        - name: Canada
        - name: New Zealand
        - name: Colombia
      header: Collection Details
    - name: division
      displayName: Division
      initiallyVisible: true
      type: string
      generateIndex: true
      autocomplete: true
      header: Collection Details
    - name: host
      displayName: Host
      initiallyVisible: true
      type: string
      autocomplete: true
      header: Collection Details
    - name: lineage
      displayName: Lineage
      isSequenceFilter: true
      initiallyVisible: false
      notSearchable: true
      type: string
    - name: pangoLineage
      isSequenceFilter: true
      initiallyVisible: true
      displayName: Pango lineage
      autocomplete: true
      type: string
      lineageSystem: pangoLineage
      options: &id002
        - name: A
        - name: A.1
        - name: A.1.1
        - name: A.2
        - name: B
    - name: hiddenField
      displayName: Hidden Field
      initiallyVisible: false
      type: string
      hideInSearchResultsTable: true
    - name: versionComment
      type: string
  tableColumns:
    - country
    - division
    - date
  defaultOrderBy: date
  defaultOrder: descending
  inputFields:
    - name: id
      displayName: ID
      example: GJP123
      noEdit: true
      required: true
      definition: Your sequence identifier; should match the sequence's id in the FASTA file - this is used to link the metadata to the FASTA sequence.
    - name: date
      displayName: Date
    - name: region
      displayName: Region
    - name: country
      displayName: Country
      options: *id001
    - name: division
      displayName: Division
    - name: host
      displayName: Host
    - name: lineage
      displayName: Lineage
    - name: pangoLineage
      displayName: Pango lineage
      required: true
      options: *id002
    - name: hiddenField
      displayName: Hidden Field
referenceGenomes: []
referenceGenome:
  nucleotideSequences: []
  genes: []
displayName: Test organism (with files)
