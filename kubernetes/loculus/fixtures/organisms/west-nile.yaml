      from which the sample was collected.
    guidance: You can provide either the scientific name of the organism (e.g., `Aedes
      aegypti`) or its NCBI taxon ID (e.g., `7159`) in this field. We will validate
      your input and use it to populate the `host common name` and `host scientific
      name` fields. When uploading data from a pooled sample, we recommend using a
      higher-level taxon that includes all host organisms in the sample pool. For
      example, you can use `Culicidae` when uploading data for a pooled mosquito sample
      (in addition to setting the `specimenProcessing` field to `Samples pooled`,
      see [OBI:0600016]).
