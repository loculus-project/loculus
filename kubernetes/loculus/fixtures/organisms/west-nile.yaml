    url: https://mapoplexus.genomium.org/?url={{[metadata+accessionVersion,accession,version,geoLocAdmin1,geoLocAdmin2,geoLocCity,geoLocCountry,geoLocSite,hostNameCommon,hostNameScientific,authors,sampleCollectionDate]}}
  metadataAdd:
  - name: displayName
    displayName: Display name
    definition: A human-readable label for the sequence record, with the format `{geoLocCountry}/{identifier}/{sampleCollectionDate}`.
      The identifier is provided from `specimenCollectorSampleId` if set, otherwise
      `submissionId`. For sequences ingested from the INSDC, the identifier is taken
      directly as the provided field, assuming it contains no slashes or spaces, otherwise
      the `accessionVersion` is used. For other sequences, if the provided field has
      a display-name format itself (four or three items, separated by slashes), then
      the identifier is extracted as the second to last item within this. If the identifier
      cannot be extracted (due to invalid format of the provided field), the `accessionVersion`
      is used. Missing `geoLocCountry`/`sampleCollectionDate` default to `unknown`.
    noInput: true
  - name: hostTaxonId
    type: string
    autocomplete: true
    displayName: Host species
    definition: Taxon ID for the host.
    customDisplay:
      type: hostSpecies
      displayGroup: hostSpecies
      label: Host
    header: Host
    ingest: ncbiHostTaxId
    noInput: true
    required: true
    orderOnDetailsPage: 1540
  - name: lineage
    displayName: Lineage
    definition: Assigned clade label from the nearest reference tree node.
    isSequenceFilter: true
    header: Lineage
    noInput: true
    generateIndex: true
    autocomplete: true
    initiallyVisible: true
    includeInDownloadsByDefault: true
  - name: mutations_from_founder
    header: Alignment and QC metrics
    displayName: Amino Acid Mutations from founder clade
    definition: Private amino acid mutations in this sequence relative to the founder
      of its assigned clade.
    customDisplay:
      type: generatedBadge
    noInput: true
    generateIndex: false
    autocomplete: false
    initiallyVisible: false
    includeInDownloadsByDefault: false
  - name: variant
    isSequenceFilter: true
    perSegment: true
    header: Alignment and QC metrics
    displayName: Variant
    definition: Indicates whether the sequence is sufficiently divergent from its
      closest reference to be classified as a distinct variant, based on whether the
      number of private nucleotide substitutions exceeds a threshold relative to sequence
      length.
    type: boolean
    noInput: true
    autocomplete: true
    initiallyVisible: false
    includeInDownloadsByDefault: false
