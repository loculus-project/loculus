schema:
  submissionDataTypes:
    consensusSequences: true
    maxSequencesPerEntry: 1
  loadSequencesAutomatically: true
  earliestReleaseDate:
    enabled: true
    externalFields:
    - ncbiReleaseDate
  richFastaHeaderFields:
  - displayName
  files:
  - name: annotations
    displayName: Annotations
  metadata:
  - name: sampleCollectionDate
    displayName: Collection date
    definition: The date on which the sample was collected.
    header: Sample details
    ingest: ncbiCollectionDate
    order: 10
    orderOnDetailsPage: 200
    includeInDownloadsByDefault: true
    notSearchable: true
    columnWidth: 100
    type: string
  - name: sampleCollectionDateRangeLower
    displayName: Collection date (lower bound)
    type: date
    initiallyVisible: true
    hideInSearchResultsTable: true
    hideOnSequenceDetailsPage: true
    header: Sample details
    rangeOverlapSearch:
      rangeName: sampleCollectionDateRange
      rangeDisplayName: Collection date
      bound: lower
    noInput: true
  - name: sampleCollectionDateRangeUpper
    displayName: Collection date (upper bound)
    type: date
    initiallyVisible: true
    hideInSearchResultsTable: true
    hideOnSequenceDetailsPage: true
    header: Sample details
    rangeOverlapSearch:
      rangeName: sampleCollectionDateRange
      rangeDisplayName: Collection date
      bound: upper
    noInput: true
  - name: displayName
    displayName: Display name
    definition: A human-readable label for the sequence record, with the format `{geoLocCountry}/{accessionVersion}/{sampleCollectionDate}`.
    noInput: true
    type: string
  - name: ncbiReleaseDate
    displayName: NCBI release date
    definition: Date the viral nucleotide accession was first released on the INSDC.
    type: date
    header: INSDC
    orderOnDetailsPage: 1000
    noInput: true
    columnWidth: 100
  - name: earliestReleaseDate
    displayName: Earliest release date
    definition: The earliest release date for the accession, across all versions in
      both Loculus and the INSDC.
    header: Sample details
    type: date
    rangeSearch: true
    noInput: true
    includeInDownloadsByDefault: true
    orderOnDetailsPage: 300
  - name: ncbiUpdateDate
    type: date
    displayName: NCBI update date
    definition: Date the viral nucleotide accession was last updated on the INSDC.
    header: INSDC
    orderOnDetailsPage: 1020
    noInput: true
    perSegment: true
    oneHeader: true
    columnWidth: 100
  - name: geoLocLatitude
    displayName: Latitude
    definition: Geo-coordinate latitude in decimal degree (WGS84) format.
    header: Sample details
    type: float
    orderOnDetailsPage: 420
  - name: geoLocLongitude
    displayName: Longitude
    definition: Geo-coordinate longitude in decimal degree (WGS84) format.
    header: Sample details
    type: float
    orderOnDetailsPage: 440
  - name: geoLocCountry
    displayName: Collection country
    definition: The country from which the sample was collected.
    generateIndex: true
    autocomplete: true
    initiallyVisible: true
    includeInDownloadsByDefault: true
    customDisplay:
      type: geoLocation
      displayGroup: geoLocation
      label: Sampling location
    header: Sample details
    order: 20
    orderOnDetailsPage: 400
    ingest: country
