  co-infections:
    displayName: Co-infections
    lapisUrl: "http://loculus-lapis-service-co-infections:8080"
    sequenceData:
      unalignedNucleotideSequences:
        enabled: true
        segments:
          - main
          - L
          - M
          - S
    query: |
      with real_organisms as (
        select
          accessionVersion, accession, version,
          submissionId, isRevocation, submitter,
          groupName, groupId, submittedAtTimestamp,
          submittedDate, releasedAtTimestamp, releasedDate,
          versionStatus, pipelineVersion, dataUseTerms,
          dataUseTermsRestrictedUntil, dataBecameOpenAt, dataUseTermsUrl,
          sampleCollectionDate, sampleCollectionDateRangeLower, sampleCollectionDateRangeUpper,
          displayName, ncbiReleaseDate, earliestReleaseDate,
          geoLocLatitude, geoLocLongitude, geoLocCountry,
          geoLocAdmin1, geoLocAdmin2, geoLocCity,
          geoLocSite, specimenCollectorSampleId,
          authors, authorAffiliations,
          sequencedByOrganization,
          hostNameScientific, hostTaxonId,
          ncbiSourceDb, ncbiVirusName, ncbiVirusTaxId,
          versionComment,
          'CCHF (Multi-Ref)' as organism
        from "cchf-multi-ref"
        union all
        select
          accessionVersion, accession, version,
          submissionId, isRevocation, submitter,
          groupName, groupId, submittedAtTimestamp,
          submittedDate, releasedAtTimestamp, releasedDate,
          versionStatus, pipelineVersion, dataUseTerms,
          dataUseTermsRestrictedUntil, dataBecameOpenAt, dataUseTermsUrl,
          sampleCollectionDate, sampleCollectionDateRangeLower, sampleCollectionDateRangeUpper,
          displayName, ncbiReleaseDate, earliestReleaseDate,
          geoLocLatitude, geoLocLongitude, geoLocCountry,
          geoLocAdmin1, geoLocAdmin2, geoLocCity,
          geoLocSite, specimenCollectorSampleId,
          authors, authorAffiliations,
          sequencedByOrganization,
          hostNameScientific, hostTaxonId,
          ncbiSourceDb, ncbiVirusName, ncbiVirusTaxId,
          versionComment,
          'Crimean-Congo Hemorrhagic Fever Virus' as organism
        from "cchf"
        union all
        select
          accessionVersion, accession, version,
          submissionId, isRevocation, submitter,
          groupName, groupId, submittedAtTimestamp,
          submittedDate, releasedAtTimestamp, releasedDate,
          versionStatus, pipelineVersion, dataUseTerms,
          dataUseTermsRestrictedUntil, dataBecameOpenAt, dataUseTermsUrl,
          sampleCollectionDate, sampleCollectionDateRangeLower, sampleCollectionDateRangeUpper,
          displayName, ncbiReleaseDate, earliestReleaseDate,
          geoLocLatitude, geoLocLongitude, geoLocCountry,
          geoLocAdmin1, geoLocAdmin2, geoLocCity,
          geoLocSite, specimenCollectorSampleId,
          authors, authorAffiliations,
          sequencedByOrganization,
          hostNameScientific, hostTaxonId,
          ncbiSourceDb, ncbiVirusName, ncbiVirusTaxId,
          versionComment,
          'Ebola Sudan' as organism
        from "ebola-sudan"
        union all
        select
          accessionVersion, accession, version,
          submissionId, isRevocation, submitter,
          groupName, groupId, submittedAtTimestamp,
          submittedDate, releasedAtTimestamp, releasedDate,
          versionStatus, pipelineVersion, dataUseTerms,
          dataUseTermsRestrictedUntil, dataBecameOpenAt, dataUseTermsUrl,
          sampleCollectionDate, sampleCollectionDateRangeLower, sampleCollectionDateRangeUpper,
          displayName, ncbiReleaseDate, earliestReleaseDate,
          geoLocLatitude, geoLocLongitude, geoLocCountry,
          geoLocAdmin1, geoLocAdmin2, geoLocCity,
          geoLocSite, specimenCollectorSampleId,
          authors, authorAffiliations,
          sequencedByOrganization,
          hostNameScientific, hostTaxonId,
          ncbiSourceDb, ncbiVirusName, ncbiVirusTaxId,
          versionComment,
          'Enterovirus' as organism
        from "enteroviruses"
        union all
        select
          accessionVersion, accession, version,
          submissionId, isRevocation, submitter,
          groupName, groupId, submittedAtTimestamp,
          submittedDate, releasedAtTimestamp, releasedDate,
          versionStatus, pipelineVersion, dataUseTerms,
          dataUseTermsRestrictedUntil, dataBecameOpenAt, dataUseTermsUrl,
          sampleCollectionDate, sampleCollectionDateRangeLower, sampleCollectionDateRangeUpper,
          displayName, ncbiReleaseDate, earliestReleaseDate,
          geoLocLatitude, geoLocLongitude, geoLocCountry,
          geoLocAdmin1, geoLocAdmin2, geoLocCity,
          geoLocSite, specimenCollectorSampleId,
          authors, authorAffiliations,
          sequencedByOrganization,
          hostNameScientific, hostTaxonId,
          ncbiSourceDb, ncbiVirusName, ncbiVirusTaxId,
          versionComment,
          'West Nile Virus' as organism
        from "west-nile"
      ),
      co_infection_samples as (
        select groupId, specimenCollectorSampleId
        from real_organisms
        where specimenCollectorSampleId is not null
          and trim(specimenCollectorSampleId) <> ''
        group by groupId, specimenCollectorSampleId
        having count(distinct organism) >= 2
      )
      select real_organisms.*
      from real_organisms
      join co_infection_samples using (groupId, specimenCollectorSampleId)
