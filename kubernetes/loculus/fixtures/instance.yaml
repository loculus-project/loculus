  test-organisms:
    displayName: Test organisms
    lapisUrl: "http://loculus-lapis-service-test-organisms:8080"
    sequenceData:
      unalignedNucleotideSequences:
        enabled: true
        segments:
          - main
    query: |
      select
                 accessionVersion, accession, version,
                 submissionId, isRevocation, submitter,
                 groupName, groupId, submittedAtTimestamp,
                 submittedDate, releasedAtTimestamp, releasedDate,
                 versionStatus, pipelineVersion, dataUseTerms,
                 dataUseTermsRestrictedUntil, dataBecameOpenAt, dataUseTermsUrl,
                 date, region, country,
                 division, host, lineage,
                 versionComment,
                 'Test organism (with files)' as organism
      from "dummy-organism-with-files"
      union all
      select
                 accessionVersion, accession, version,
                 submissionId, isRevocation, submitter,
                 groupName, groupId, submittedAtTimestamp,
                 submittedDate, releasedAtTimestamp, releasedDate,
                 versionStatus, pipelineVersion, dataUseTerms,
                 dataUseTermsRestrictedUntil, dataBecameOpenAt, dataUseTermsUrl,
                 date, region, country,
                 division, host, lineage,
                 versionComment,
                 'Test Dummy Organism' as organism
      from "dummy-organism"
      union all
      select
                 accessionVersion, accession, version,
                 submissionId, isRevocation, submitter,
                 groupName, groupId, submittedAtTimestamp,
                 submittedDate, releasedAtTimestamp, releasedDate,
                 versionStatus, pipelineVersion, dataUseTerms,
                 dataUseTermsRestrictedUntil, dataBecameOpenAt, dataUseTermsUrl,
                 date, region, country,
                 division, host, lineage,
                 versionComment,
                 'Test organism (without alignment)' as organism
      from "not-aligned-organism"
