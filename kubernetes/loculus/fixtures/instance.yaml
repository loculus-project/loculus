# Cross-organism overview table / LAPIS instance (admin-configurable fields).
overview:
  displayName: Overview
  lapisUrl: "http://loculus-lapis-service-overview:8080"
  sequenceData:
    unalignedNucleotideSequences:
      enabled: true
      segments:
        - main
        - L
        - M
        - S
  query: |
    select accessionVersion, accession, version, submissionId, isRevocation,
           submitter, groupName, groupId, submittedAtTimestamp, submittedDate,
           releasedAtTimestamp, releasedDate, versionStatus, versionComment,
           pipelineVersion, dataUseTerms, dataUseTermsRestrictedUntil,
           dataBecameOpenAt, dataUseTermsUrl, geoLocCountry as country,
           sampleCollectionDate as date, 'CCHF (Multi-Ref)' as organism
    from "cchf-multi-ref"
    union all
    select accessionVersion, accession, version, submissionId, isRevocation,
           submitter, groupName, groupId, submittedAtTimestamp, submittedDate,
           releasedAtTimestamp, releasedDate, versionStatus, versionComment,
           pipelineVersion, dataUseTerms, dataUseTermsRestrictedUntil,
           dataBecameOpenAt, dataUseTermsUrl, geoLocCountry as country,
           sampleCollectionDate as date, 'Crimean-Congo Hemorrhagic Fever Virus' as organism
    from "cchf"
    union all
    select accessionVersion, accession, version, submissionId, isRevocation,
           submitter, groupName, groupId, submittedAtTimestamp, submittedDate,
           releasedAtTimestamp, releasedDate, versionStatus, versionComment,
           pipelineVersion, dataUseTerms, dataUseTermsRestrictedUntil,
           dataBecameOpenAt, dataUseTermsUrl, country as country,
           date as date, 'Test organism (with files)' as organism
    from "dummy-organism-with-files"
    union all
    select accessionVersion, accession, version, submissionId, isRevocation,
           submitter, groupName, groupId, submittedAtTimestamp, submittedDate,
           releasedAtTimestamp, releasedDate, versionStatus, versionComment,
           pipelineVersion, dataUseTerms, dataUseTermsRestrictedUntil,
           dataBecameOpenAt, dataUseTermsUrl, country as country,
           date as date, 'Test Dummy Organism' as organism
    from "dummy-organism"
    union all
    select accessionVersion, accession, version, submissionId, isRevocation,
           submitter, groupName, groupId, submittedAtTimestamp, submittedDate,
           releasedAtTimestamp, releasedDate, versionStatus, versionComment,
           pipelineVersion, dataUseTerms, dataUseTermsRestrictedUntil,
           dataBecameOpenAt, dataUseTermsUrl, geoLocCountry as country,
           sampleCollectionDate as date, 'Ebola Sudan' as organism
    from "ebola-sudan"
    union all
    select accessionVersion, accession, version, submissionId, isRevocation,
           submitter, groupName, groupId, submittedAtTimestamp, submittedDate,
           releasedAtTimestamp, releasedDate, versionStatus, versionComment,
           pipelineVersion, dataUseTerms, dataUseTermsRestrictedUntil,
           dataBecameOpenAt, dataUseTermsUrl, geoLocCountry as country,
           sampleCollectionDate as date, 'Enterovirus' as organism
    from "enteroviruses"
    union all
    select accessionVersion, accession, version, submissionId, isRevocation,
           submitter, groupName, groupId, submittedAtTimestamp, submittedDate,
           releasedAtTimestamp, releasedDate, versionStatus, versionComment,
           pipelineVersion, dataUseTerms, dataUseTermsRestrictedUntil,
           dataBecameOpenAt, dataUseTermsUrl, country as country,
           date as date, 'Test organism (without alignment)' as organism
    from "not-aligned-organism"
    union all
    select accessionVersion, accession, version, submissionId, isRevocation,
           submitter, groupName, groupId, submittedAtTimestamp, submittedDate,
           releasedAtTimestamp, releasedDate, versionStatus, versionComment,
           pipelineVersion, dataUseTerms, dataUseTermsRestrictedUntil,
           dataBecameOpenAt, dataUseTermsUrl, geoLocCountry as country,
           sampleCollectionDate as date, 'West Nile Virus' as organism
    from "west-nile"
  schema: |
    schema:
      instanceName: Overview
      opennessLevel: OPEN
      metadata:
        - name: accessionVersion
          displayName: Accession version
          type: string
          notSearchable: true
          hideOnSequenceDetailsPage: true
          includeInDownloadsByDefault: true
        - name: accession
          displayName: Accession
          type: string
          notSearchable: true
          hideOnSequenceDetailsPage: true
        - name: version
          displayName: Version
          type: int
          hideOnSequenceDetailsPage: true
        - name: submissionId
          displayName: Submission ID
          type: string
          header: Submission details
          substringSearch: true
          includeInDownloadsByDefault: true
        - name: isRevocation
          displayName: Is revocation
          type: boolean
          autocomplete: true
          hideOnSequenceDetailsPage: true
        - name: submitter
          displayName: Submitter
          type: string
          generateIndex: true
          autocomplete: true
          header: Submission details
          hideOnSequenceDetailsPage: true
        - name: groupName
          displayName: Submitting group
          type: string
          generateIndex: true
          autocomplete: true
          header: Submission details
          includeInDownloadsByDefault: true
        - name: groupId
          displayName: Submitting group (numeric ID)
          type: int
          autocomplete: true
          header: Submission details
        - name: submittedAtTimestamp
          displayName: Date submitted
          type: timestamp
          header: Submission details
        - name: submittedDate
          displayName: Date submitted (exact)
          type: string
          generateIndex: true
          autocomplete: true
          hideOnSequenceDetailsPage: true
        - name: releasedAtTimestamp
          displayName: Date released
          type: timestamp
          header: Submission details
          columnWidth: 100
        - name: releasedDate
          displayName: Date released (exact)
          type: string
          generateIndex: true
          autocomplete: true
          hideOnSequenceDetailsPage: true
          columnWidth: 100
        - name: versionStatus
          displayName: Version status
          type: string
          generateIndex: true
          autocomplete: true
          hideOnSequenceDetailsPage: true
        - name: versionComment
          displayName: Version comment
          type: string
          header: Submission details
        - name: pipelineVersion
          displayName: Pipeline version
          type: int
          notSearchable: true
          hideOnSequenceDetailsPage: true
        - name: dataUseTerms
          displayName: Data use terms
          type: string
          generateIndex: true
          autocomplete: true
          header: Data use terms
          initiallyVisible: true
          includeInDownloadsByDefault: true
        - name: dataUseTermsRestrictedUntil
          displayName: Data use terms restricted until
          type: date
          header: Data use terms
          hideOnSequenceDetailsPage: true
        - name: dataBecameOpenAt
          displayName: Date data became open
          type: date
          header: Data use terms
          hideOnSequenceDetailsPage: true
        - name: dataUseTermsUrl
          displayName: Data use terms URL
          type: string
          header: Data use terms
          notSearchable: true
          includeInDownloadsByDefault: true
        - name: country
          displayName: Country
          type: string
          generateIndex: true
          autocomplete: true
          header: Sample details
          initiallyVisible: true
          includeInDownloadsByDefault: true
        - name: date
          displayName: Collection date
          type: string
          header: Sample details
          initiallyVisible: true
          generateIndex: true
          autocomplete: true
          columnWidth: 100
        - name: organism
          displayName: Organism
          type: string
          generateIndex: true
          autocomplete: true
          header: Sample details
          initiallyVisible: true
          includeInDownloadsByDefault: true
      primaryKey: accessionVersion
      defaultOrderBy: date
      defaultOrder: descending
      features:
        - name: generalizedAdvancedQuery
  tableColumns:
    - organism
    - country
    - date

