          header: "Host"
          ingest: ncbiHostName
          initiallyVisible: true
        - name: variant_L
          isSequenceFilter: true
          header: "Clade & Lineage"
          oneHeader: true
          displayName: "Variant L"
          definition: "Indicates whether the segment is sufficiently divergent from its closest reference to be classified as a distinct variant, based on whether the number of nucleotide substitutions exceeds a threshold relative to segment length."
          relatesToSegment: L
          type: boolean
          noInput: true
