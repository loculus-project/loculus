      - name: frameShifts
        header: "Alignment states and QC metrics"
        noInput: true
        perSegment: true
        displayName: Frame shifts
        preprocessing:
          inputs: {input: nextclade.frameShifts}
      - name: displayName
        preprocessing:
          function: concatenate
          inputs:
            geoLocCountry: geoLocCountry
            sampleCollectionDate: sampleCollectionDate
          args:
            order: [geoLocCountry, accession_version, sampleCollectionDate]
            type: [string, string, date]
        noInput: true
      - name: division
        displayName: Collection subdivision level 1
        generateIndex: true
        autocomplete: true
        initiallyVisible: true
        header: Sample details
        ingest: division
      - name: hostNameScientific
        generateIndex: true
        autocomplete: true
        header: "Host"
        ingest: ncbiHostName
      - name: hostTaxonId
        type: int
        autocomplete: true
        customDisplay:
          type: link
          url: "https://www.ncbi.nlm.nih.gov/Taxonomy/Browser/wwwtax.cgi?mode=info&id=__value__"
        header: "Host"
        ingest: ncbiHostTaxId
      - name: insdcAccessionBase
        header: "INSDC"
        hideOnSequenceDetailsPage: true
        noInput: true
        perSegment: true
        oneHeader: true
      - name: insdcAccessionFull
        displayName: INSDC accession
        customDisplay:
          type: link
          url: "https://www.ncbi.nlm.nih.gov/nuccore/__value__"
        header: "INSDC"
        ingest: genbankAccession
        noInput: true
        perSegment: true
        oneHeader: true
      - name: insdcVersion
        type: int
        header: "INSDC"
        hideOnSequenceDetailsPage: true
        noInput: true
        perSegment: true
        oneHeader: true
      - name: isLabHost
        type: boolean
        autocomplete: true
        header: "Host"
        ingest: ncbiIsLabHost
      - name: length
        type: int
        header: "Alignment states and QC metrics"
        noInput: true
        rangeSearch: true
        initiallyVisible: true
        perSegment: true
        displayName: Length
      - name: ncbiReleaseDate
        displayName: NCBI release date
        type: date
        header: "INSDC"
        preprocessing:
          function: parse_timestamp
          inputs:
            timestamp: ncbiReleaseDate
        noInput: true
      - name: ncbiSourceDb
        generateIndex: true
        autocomplete: true
        header: "INSDC"
        hideOnSequenceDetailsPage: true
        noInput: true
      - name: ncbiUpdateDate
        type: date
        displayName: NCBI update date
        header: "INSDC"
        preprocessing:
          function: parse_timestamp
          inputs:
            timestamp: ncbiUpdateDate
        noInput: true
        perSegment: true
        oneHeader: true
      - name: ncbiVirusName
        generateIndex: true
        autocomplete: true
        hideOnSequenceDetailsPage: true
        noInput: true
        header: "INSDC"
      - name: ncbiVirusTaxId
        type: int
        autocomplete: true
        customDisplay:
          type: link
          url: "https://www.ncbi.nlm.nih.gov/labs/virus/vssi/#/virus?SeqType_s=Nucleotide&VirusLineage_ss=taxid:__value__"
        hideOnSequenceDetailsPage: true
        noInput: true
        header: "INSDC"
        perSegment: true
      - name: purposeOfSampling
        ontology_id: GENEPIO:0001198
        definition: The reason that the sample was collected.
        guidance: Select a value from the pick list in the template
        example: Diagnostic testing
        header: Sampling
        ingest: ncbiPurposeOfSampling
      - name: sampleCollectionDate
        displayName: Collection date
        type: date
        initiallyVisible: true
        header: Sample details
        ingest: ncbiCollectionDate
        preprocessing:
          function: parse_and_assert_past_date
          inputs:
            date: sampleCollectionDate
        required: true
      - name: specimenCollectorSampleId
        displayName: Isolate name
        header: Sample details
        ingest: ncbiIsolateName
      - name: sraRunAccession
        displayName: SRA run accession
        customDisplay:
          type: link
          url: "https://www.ncbi.nlm.nih.gov/sra/?term=__value__"
        header: "INSDC"
        ingest: ncbiSraAccessions
        noInput: true
      - name: totalAmbiguousNucs
        type: int
        header: "Alignment states and QC metrics"
        noInput: true
        rangeSearch: true
        perSegment: true
        displayName: Total ambiguous nucs
        preprocessing:
          inputs: {input: "nextclade.totalNonACGTNs"}
      - name: totalDeletedNucs
        type: int
        header: "Alignment states and QC metrics"
        noInput: true
        rangeSearch: true
        perSegment: true
        preprocessing:
          inputs: {input: nextclade.totalDeletions}
        displayName: Total deleted nucs
      - name: totalFrameShifts
        type: int
        rangeSearch: true
        header: "Alignment states and QC metrics"
        noInput: true
        perSegment: true
        displayName: Total frame shifts
        preprocessing:
          inputs: {input: nextclade.totalFrameShifts}
      - name: totalInsertedNucs
        type: int
        header: "Alignment states and QC metrics"
        noInput: true
        rangeSearch: true
        perSegment: true
        displayName: Total inserted nucs
        preprocessing:
          inputs: {input: nextclade.totalInsertions}
      - name: totalSnps
        type: int
        header: "Alignment states and QC metrics"
        noInput: true
        rangeSearch: true
        perSegment: true
        displayName: Total SNPs
        preprocessing:
          inputs: {input: nextclade.totalSubstitutions}
      - name: totalUnknownNucs
        type: int
        header: "Alignment states and QC metrics"
        noInput: true
        rangeSearch: true
        perSegment: true
        displayName: Total unknown nucs
        preprocessing:
          inputs: {input: nextclade.totalMissing}
    website:
      tableColumns:
        - sampleCollectionDate
        - ncbiReleaseDate
        - authors
        - authorAffiliations
        - country
        - division
      defaultOrderBy: sampleCollectionDate
      defaultOrder: descending
    silo:
      dateToSortBy: sampleCollectionDate
  preprocessing:
    - &preprocessing
      version: 1
      image: ghcr.io/loculus-project/preprocessing-nextclade
      args:
        - "prepro"
      configFile: &preprocessingConfigFile
        log_level: DEBUG
        batch_size: 100
  ingest: &ingest
    image: ghcr.io/loculus-project/ingest

defaultOrganisms:
  h5n1:
    <<: *defaultOrganismConfig
    schema:
      <<: *schema
      organismName: "Influenza A/H5N1"
      nucleotideSequences: [ "seg1", "seg2", "seg3", "seg4", "seg5", "seg6", "seg7", "seg8" ]
    preprocessing:
      - <<: *preprocessing
        configFile:
          <<: *preprocessingConfigFile
          log_level: DEBUG
          nextclade_dataset_name: "community/genspectrum/flu/h5n1"
          nextclade_dataset_server: "https://raw.githubusercontent.com/anna-parker/nextclade_data/h5n1/data_output"
          nucleotideSequences: [ "seg1", "seg2", "seg3", "seg4", "seg5", "seg6", "seg7", "seg8" ]
          genes: [ "PB2", "PB1", "PA", "PAX", "HA", "NA", "NP", "M1", "M2", "NS1", "NS2" ]
    ingest:
      <<: *ingest
      configFile:
        taxon_id: 197911
        filter_fasta_headers: "(H5N1)"
        nucleotide_sequences: [ "seg1", "seg2", "seg3", "seg4", "seg5", "seg6", "seg7", "seg8" ]
        nextclade_dataset_server: "https://raw.githubusercontent.com/anna-parker/nextclade_data/h5n1/data_output"
        nextclade_dataset_name: "community/genspectrum/flu/h5n1"
    referenceGenomes:
      nucleotideSequences:
        - name: "seg1"
          sequence: "[[URL:https://raw.githubusercontent.com/corneliusroemer/seqs/main/artefacts/influenza/h5n1/segments/seg1.fasta]]"
          insdc_accession_full: "NC_007357.1"
