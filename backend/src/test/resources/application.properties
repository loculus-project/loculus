spring.config.import=file:src/main/resources/application.properties
loculus.config.path=src/test/resources/backend_config.json

loculus.enable-seqsets=true
crossref.endpoint=dummy
crossref.username=dummy
crossref.password=dummy
crossref.doi-prefix=placeholder
crossref.database-name=Loculus Database
crossref.email=dois@loculus.org
crossref.organization=loculus.org
crossref.host-url=https://main.loculus.org

loculus.ldap.host=localhost
loculus.ldap.port=3890
loculus.ldap.base-dn=dc=loculus,dc=org
loculus.ldap.user-base-dn=ou=people,dc=loculus,dc=org
loculus.ldap.group-base-dn=ou=groups,dc=loculus,dc=org
loculus.ldap.user-filter=(&(uid={0})(objectClass=person))
loculus.ldap.bind-dn=uid=admin,ou=people,dc=loculus,dc=org
loculus.ldap.bind-password=dummy

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://some.value
