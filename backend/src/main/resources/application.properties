server.port=8079
server.max-http-request-header-size=20KB

springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=alpha
server.forward-headers-strategy=framework
spring.servlet.multipart.max-file-size=5000MB
spring.servlet.multipart.max-request-size=5000MB
spring.mvc.async.request-timeout=36000000

server.compression.enabled=true

spring.datasource.driverClassName=org.postgresql.Driver
spring.flyway.locations=classpath:db/migration,classpath:org/loculus/backend/db/migration
spring.flyway.validate-migration-naming=true
spring.flyway.baseline-on-migrate=true

springdoc.show-actuator=true
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

loculus.cleanup.task.reset-stale-in-processing-after-seconds=60
loculus.cleanup.task.run-every-seconds=60
loculus.pipeline-version-upgrade-check.interval-seconds=10
loculus.seqset-citations.run-every-minutes=360
loculus.maintenance.clean-up-aux-table.run-every-hours=1
loculus.stream.batch-size=1000
# Dedicated directory for released data exports. Empty uses the JVM temp directory.
loculus.stream.spool-dir=
# Maximum number of released data exports prepared at once.
loculus.stream.max-concurrent-spools=4
# Total space available to spool files.
loculus.stream.spool-max-total-bytes=19327352832
# Free space that must remain in the spool directory.
loculus.stream.spool-min-free-bytes=1073741824
# Age when an abandoned spool file can be removed.
loculus.stream.spool-file-ttl-minutes=180
loculus.stream.spool-sweep-every-minutes=30
loculus.debug-mode=false

loculus.s3.enabled=false
loculus.s3.gc-enabled=false
loculus.s3.gc-orphan-retention-period-minutes=10080
loculus.s3.gc-initial-delay-minutes=15
loculus.s3.gc-frequency-minutes=1440
loculus.s3.bucket.endpoint=
loculus.s3.bucket.bucket=
loculus.s3.bucket.region=
loculus.s3.bucket.access-key=
loculus.s3.bucket.secret-key=
