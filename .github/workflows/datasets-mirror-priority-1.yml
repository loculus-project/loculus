name: Mirror NCBI Datasets (Priority 1 - Every 2 Hours)
on:
  workflow_dispatch:  # Allows manual triggering to re-run all priority-1 taxa
  schedule:
    - cron: '12 */2 * * *' # Runs every two hours at 12 minutes past the hour
jobs:
  mirror:
    strategy:
      matrix:
        taxon_id:
          - 1868215  # Orthopneumovirus (RSV)
          - 1980456  # Orthohantavirus andesense
          - 3046277  # Orthoflavivirus flavi
          - 3048148  # Metapneumovirus hominis
          - 3048448  # Orthoflavivirus nilense (West nile virus)
          - 3052345  # Morbillivirus hominis (Measles)
          - 3052458  # Orthoebolavirus bundibugyoense
          - 3052460  # Orthoebolavirus sudanense
          - 3052462  # Orthoebolavirus zairense
          - 3052464  # Orthoflavivirus denguei
          - 3052505  # Orthomarburgvirus marburgense
          - 3052518  # Orthonairovirus haemorrhagiae (CCHFV)
          - 3431483  # Orthopoxvirus monkeypox
          - 3048459  # Orthoflavivirus zikaense
      fail-fast: false
    uses: ./.github/workflows/datasets-mirror.yml
    secrets: inherit
    with:
      taxon_id: ${{ matrix.taxon_id }}
