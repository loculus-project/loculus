name: deacon-index-test-image

on:
  pull_request:
    paths:
      - "file-processing/test/fixtures/deacon.idx"
      - ".github/workflows/deacon-index-test-image.yml"
  push:
    branches:
      - main
      - deacon-service # revert
    paths:
      - "file-processing/test/fixtures/deacon.idx"
      - ".github/workflows/deacon-index-test-image.yml"
  workflow_dispatch:

env:
  DEACON_INDEX_IMAGE: ghcr.io/loculus-project/deacon-index

jobs:
  deacon-index-test-image:
    name: Build test deacon-index image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish test deacon-index image
        run: |
          # Publishes the tiny index used by file-processing's unit tests
          # (file-processing/test/fixtures/deacon.idx, built from test_small_1.fastq),
          # so e2e/dev environments can use it instead of the full production index,
          # which otherwise requires a lot of memory just to load into the
          # file-processing pod (see kubernetes/loculus/values_e2e_and_dev.yaml).
          #
          # This must be a real container image (FROM scratch + COPY), not a bare
          # OCI artifact (e.g. `oras push --artifact-type ...`): Kubernetes'
          # ImageVolume / containerd only support images with a proper image
          # config (rootfs.diff_ids matching the layers). Artifacts with an empty
          # config fail to mount with "mismatched image rootfs and manifest layers".
          # See https://github.com/containerd/containerd/issues/11907
          cp file-processing/test/fixtures/deacon.idx deacon.idx
          cat <<'EOF' > Dockerfile.deacon-index-test
          FROM scratch
          COPY deacon.idx /deacon.idx
          EOF

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Validate the image builds, but don't publish from untrusted PR branches.
            docker buildx build -f Dockerfile.deacon-index-test .
          else
            docker buildx build \
              --push \
              --tag "${DEACON_INDEX_IMAGE}:test" \
              -f Dockerfile.deacon-index-test .
          fi
