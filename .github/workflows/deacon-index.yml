name: Create and Upload Custom Deacon Index

on:
  workflow_dispatch: # Only manual trigger for now, since this is a rare operation

env:
  DEACON_INDEX_IMAGE: ghcr.io/loculus-project/deacon-index

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      index_zipped: ${{ steps.set-filenames.outputs.index_zipped }}
      oci_tag: ${{ steps.set-filenames.outputs.oci_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set versioned filenames
        id: set-filenames
        run: |
          DATE_TAG="$(date +'%Y-%m-%d')"
          VERSIONED_NAME="deacon_index_${DATE_TAG}.idx"
          ZIPPED_NAME="${VERSIONED_NAME}.gz"

          echo "INDEX_VERSIONED=${VERSIONED_NAME}" >> $GITHUB_ENV
          echo "INDEX_ZIPPED=${ZIPPED_NAME}" >> $GITHUB_ENV
          echo "INDEX_LATEST=deacon_index_latest.idx.gz" >> $GITHUB_ENV
          echo "DATE_TAG=${DATE_TAG}" >> $GITHUB_ENV
          echo "index_zipped=${ZIPPED_NAME}" >> $GITHUB_OUTPUT
          echo "oci_tag=${DATE_TAG}" >> $GITHUB_OUTPUT

      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: ./file-processing/environment.yml
          cache-environment: true
          create-args: >
            s3cmd

      - name: Create deacon index
        shell: bash -l {0}
        run: |
          ./file-processing/build-index.sh -o "${INDEX_VERSIONED}"
          ls -lh "${INDEX_VERSIONED}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish deacon index as an OCI image for the file-processing image volume
        run: |
          # Push under a stable filename ("deacon.idx") regardless of the dated
          # build filename, so the mounted path in the deployment never changes.
          #
          # This must be a real container image (FROM scratch + COPY), not a bare
          # OCI artifact (e.g. `oras push --artifact-type ...`): Kubernetes'
          # ImageVolume / containerd only support images with a proper image
          # config (rootfs.diff_ids matching the layers). Artifacts with an empty
          # config fail to mount with "mismatched image rootfs and manifest layers".
          # See https://github.com/containerd/containerd/issues/11907
          cp "${INDEX_VERSIONED}" deacon.idx
          cat <<'EOF' > Dockerfile.deacon-index
          FROM scratch
          COPY deacon.idx /deacon.idx
          EOF
          docker buildx build \
            --push \
            --tag "${DEACON_INDEX_IMAGE}:${DATE_TAG}" \
            --tag "${DEACON_INDEX_IMAGE}:latest" \
            -f Dockerfile.deacon-index .

      - name: Create S3cmd config
        run: |
          cat <<EOF > ~/.s3cfg
          [default]
          access_key = ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          secret_key = ${{ secrets.HETZNER_S3_SECRET_KEY }}
          host_base = hel1.your-objectstorage.com
          host_bucket = %(bucket)s.hel1.your-objectstorage.com
          verbosity = WARNING
          EOF

      - name: Compress and upload deacon index
        shell: bash -l {0}
        run: |
          gzip -9 "${INDEX_VERSIONED}"
          s3cmd put "${INDEX_ZIPPED}" s3://loculus-public/deacon-index/"${INDEX_ZIPPED}"

          s3cmd cp s3://loculus-public/deacon-index/"${INDEX_ZIPPED}" \
            s3://loculus-public/deacon-index/"${INDEX_LATEST}"

  notify_on_success:
    needs: build-and-upload
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send Slack Notification
        env:
          SLACK_HOOK: ${{ secrets.SLACK_HOOK }}
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "✅ Successfully built and uploaded Deacon index ${{ needs.build-and-upload.outputs.index_zipped }} (also published as ghcr.io/loculus-project/deacon-index:${{ needs.build-and-upload.outputs.oci_tag }} / :latest): ${{ github.repository }}\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
          }' $SLACK_HOOK

  notify_on_failure:
    needs: build-and-upload
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send Slack Notification
        env:
          SLACK_HOOK: ${{ secrets.SLACK_HOOK }}
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "🚨 Failed to build and upload Deacon index: ${{ github.repository }}\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
          }' $SLACK_HOOK
