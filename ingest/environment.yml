dependencies:
  # Core Python dependencies
  - python=3.14.5 # Pinned to 3.12.x series, check for patch updates within 3.12
  # Extra dependencies
  - biopython=1.87
  - click=8.4.1
  - curl=8.20.0
  - ijson=3.5.0
  - jsonlines=4.0.0
