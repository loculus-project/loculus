  - nextclade=3.21.2
  - orjsonl=1.0.0
  - pandas=2.3.3
  - psycopg2=2.9.11
  - pytz=2026.1.post1
  - pyyaml=6.0.3
  - requests=2.33.1
  - seqkit=2.13.0
  - snakefmt=1.1.0
  - snakemake=9.20.0
  - unzip=6.0
  - pytest=9.0.3
