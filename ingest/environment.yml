  - psycopg2=2.9.12
  - pytz=2026.2
  - pyyaml=6.0.3
  - requests=2.34.2
  - seqkit=2.13.0
  - snakefmt=1.1.0
  - snakemake=9.21.1
  - unzip=6.0
  - pytest=9.0.3
