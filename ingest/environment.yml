  - bioconda
  - nodefaults
dependencies:
  # Core Python dependencies
  - python=3.12.9 # Pinned to 3.12.x series, check for patch updates within 3.12
  # Extra dependencies
  - biopython=1.87
  - click=8.3.3
  - curl=8.20.0
  - ijson=3.5.0
  - jsonlines=4.0.0
