processing_spec:
  hostNameScientific:
    function: scientific_name_from_id
    inputs:
      hostNameScientific: hostNameScientific
      hostTaxonId: processed.hostTaxonId
    args: &preprocessingTaxonomyTestArgs
      taxonomy_service_host: "http://localhost"
      taxonomy_service_port: 5000
  hostNameCommon:
    function: common_name_from_id
    inputs:
      hostTaxonId: processed.hostTaxonId
    args: *preprocessingTaxonomyTestArgs
  hostTaxonId:
    function: validate_hostname
    inputs:
      hostNameScientific: hostNameScientific
      # In production, this would instead be `ncbiHostTaxId: ncbiHostTaxId`.
      # We add `hostTaxonId` here only because in production, ingest would
      # rename ncbiHostTaxId -> hostTaxonId, which we don't have in tests
      hostTaxonId: hostTaxonId
    args: *preprocessingTaxonomyTestArgs
